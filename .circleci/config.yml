# quire CI/CD Configuration
# 
# CI/CD for quire has three phases:
#   - Install, build, and test across all OS combinations
#   - Test build outputs of all OS combinations
#   - Publish releases for tags `@thegetty/quire-cli-vXXX` or `@thegetty/quire-11ty-vXXX`
#

version: 2.1

orbs:
  browser-tools: circleci/browser-tools@2.1.2
  cypress: cypress-io/cypress@3.4.3
  mac: circleci/macos@2.5.2
  node: circleci/node@7.2.1
  win: circleci/windows@5.1.0
  gh: circleci/github-cli@2.7.2

executors:
  pw-noble-development:
    docker:
      - image: mcr.microsoft.com/playwright:v1.60.0-noble
  linux:
    docker:
      - image: cimg/base:current-22.04
        user: root
    environment:
        PUPPETEER_EXECUTABLE_PATH: '/usr/bin/google-chrome-stable'

  macos:
    macos:
      xcode: '16.3.0'
    resource_class: m4pro.medium
    environment:
        PUPPETEER_EXECUTABLE_PATH: '/Applications/Google Chrome.app/Contents/MacOS/Google Chrome'
  win: 
    machine:
      image: windows-server-2019-vs2019:current
      resource_class: windows.medium
    environment:
        PUPPETEER_EXECUTABLE_PATH: 'C:\Program Files\Google\Chrome\Application\chrome.exe'

anchors:

  - &npm_cache_key package-cache-{{ .Branch }}-{{ checksum "package-lock.json" }}-{{ .Environment.CACHE_VERSION }}

  - &os_param
    parameters:
      os:
        type: string

  - &matrix_params
    matrix:
      parameters:
        os: [ 'linux', 'macos', 'win' ]

commands:
  # Pack and install the CLI globally (NB: uncached puppeteer install takes a while)
  build_install_cli:
    steps:
      - run:
          name: Install CLI
          no_output_timeout: 30m
          command: npm pack -w packages/cli && npm install --ignore-scripts --foreground-scripts -g thegetty-quire-cli-*.tgz
      - run:
          name: Quire Version
          command: quire --version

  build_install_cli-linux:
    steps:
      - node/install:
          node-version: "22.14.0"
      - browser-tools/install_chrome
      # @TODO: Replace this hack that force-disables sandboxing
      # 
      # On linux chrome requires disabling sandboxing (or using deprecated suid containers) if run as root
      # See https://pptr.dev/troubleshooting#setting-up-chrome-linux-sandbox
      - run:
          name: "Modify chrome app"
          command: sudo sed -i 's|HERE/chrome"|HERE/chrome" --no-sandbox|g' /opt/google/chrome/google-chrome
      - browser-tools/install_chromedriver
      - build_install_cli

  build_install_cli-macos:
    steps:
      - node/install:
          node-version: "22.14.0"
      - browser-tools/install_chrome
      - browser-tools/install_chromedriver      
      - build_install_cli

  build_install_cli-win:
    steps:
      # Zip to package the test-built site
      - run: choco install zip
      - run: choco install googlechrome chromedriver --ignore-checksums
      - build_install_cli

  install_deps-linux:
    steps:
      - run:
          name: Install External Dependencies -- eg Prince
          command: exit

  install_deps-macos:
    steps:
      - run:
          name: Install External Dependencies -- eg Prince
          command: exit

  install_deps-win:
    steps:
      - run:
          name: Install External Dependencies -- eg Prince
          command: exit

  run_tests:
    steps:
      - run:
          name: Set git email
          command: git config --global user.email quire@getty.edu 
      # Install test dependencies only
      - run:
          name: Install deps
          command: npm install --ignore-scripts --foreground-scripts
      - run:
          name: Run integration tests
          command: mkdir -p reports && npm run test:integration
          no_output_timeout: 15m

      # Persist the site build for browser testing and submit test reports
      - persist_to_workspace:
          root: .
          paths:
            - playwright.config.js
            - package.json
            - reports
            - test-publication/_site
            - test-publication-pathname/_site
            - _tests

      - store_test_results:
          path: reports

      # @TODO: Turn this off when we're happy with snapshot coverage of browser tests
      - store_artifacts:
          path: publication.zip

      # Run core package tests - @TODO: Consider moving this above the integration test
      - run:
          name: Run CLI tests
          command: npm -w packages/cli run test
      - run:
          name: Run 11ty tests
          command: npm -w packages/11ty run test

  test-linux:
    steps:
      - run_tests
      - run:
          name: Build package artifacts
          command: npm -ws pack
      - persist_to_workspace:
          root: .
          paths:
            - thegetty-quire*.tgz

  test-macos:
    steps:
      - run_tests

  test-win:
    steps:
      - run_tests

jobs:

  # Builds the CLI, installs it, and tests it by building a publication
  build_install_test:
    <<: *os_param
    executor: << parameters.os >>
    steps:
      - checkout
      - restore_cache:
          keys:
            - *npm_cache_key
      - build_install_cli-<< parameters.os >>
      - install_deps-<< parameters.os >>
      - save_cache:
          key: *npm_cache_key
          paths:
            - node_modules
            - ~/.npm
            - ~/.cache
      - test-<< parameters.os >>

  # Tests the output of the publication build -- must be separate for the playwright executor
  browser_test:
    executor: pw-noble-development
    # NB: taken from https://playwright.dev/docs/ci#sharding-in-circleci
    parallelism: 2
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Install browser testing dependencies
          command: npm i && apt-get update && apt-get install -y zip && npx playwright install
      # test:browsers-circleci follows https://playwright.dev/docs/ci#circleci to correct sharding
      - run: 
          name: Run browser testing on integration test artifacts
          command: npm run test:browsers-circleci
      - store_test_results:
          path: reports

  # Job to send package artifacts to all release channels
  release:
    docker:
      - image: cimg/node:24.15
    steps:
      - gh/install
      - checkout
      - run:
          name: Install release process dependencies
          command: npm -ws=false ci
      - run:
          name: Build release assets
          command: npm -ws pack

      # quire-cli release
      - when:
          condition: << pipeline.git.tag starts-with "@thegetty/quire-cli" >>
          steps:
            - run:
                name: Publish CLI release to npm with OIDC
                command: |
                  export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')

                  if [[ $CIRCLE_TAG == *"-rc."* ]]; then
                    npm -w packages/cli publish --tag rc
                  else
                    npm -w packages/cli publish
                  fi
            - run:
                name: Publish CLI release to github
                command: |
                  if [[ $CIRCLE_TAG == *"-rc."* ]]; then
                    gh release create "$CIRCLE_TAG" --notes-from-tag thegetty-quire-cli*.tgz 
                  else 
                    gh release create "$CIRCLE_TAG" --notes-from-tag --latest thegetty-quire-cli*.tgz                   
                  fi

      # quire-11ty release
      - when:
          condition: << pipeline.git.tag starts-with "@thegetty/quire-11ty" >>
          steps:
            - run:
                name: Install release process dependencies
                command: npm -w packages/11ty i
            - run:
                name: Publish 11ty release to npm with OIDC
                command: |
                  export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')

                  if [[ $CIRCLE_TAG == *"-rc."* ]]; then
                    npm -w packages/11ty publish --tag rc
                  else
                    npm -w packages/11ty publish
                  fi                  
            - run:
                name: Publish 11ty release to github
                command: |
                  if [[ $CIRCLE_TAG == *"-rc."* ]]; then
                    gh release create "$CIRCLE_TAG" --notes-from-tag thegetty-quire-11ty*.tgz 
                  else
                    gh release create "$CIRCLE_TAG" --notes-from-tag --latest thegetty-quire-11ty*.tgz 
                  fi

# Fan out build, test, and release phases but execute sequentially
workflows:
  build_install_test_release:
    when: true
    jobs:
      - build_install_test:
          <<: *matrix_params
          name: build_install_test-<< matrix.os >>
          filters:
            tags:
              only: /.*/
      - browser_test:
          name: browser_test-linux
          requires:
            - build_install_test-linux
          filters:
            tags:
              only: /.*/
      - browser_test:
          name: browser_test-macos
          requires:
            - build_install_test-macos
          filters:
            tags:
              only: /.*/
      - browser_test:
          name: browser_test-win
          requires:
            - build_install_test-win
          filters:
            tags:
              only: /.*/

      - release:
          filters:
            tags:
              only: /^(@thegetty\/quire-cli|@thegetty\/quire-11ty).+/
            branches:
              ignore: /.*/          
          requires:
            - browser_test-linux
            - browser_test-macos
            - browser_test-win
